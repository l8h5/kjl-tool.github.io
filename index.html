<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface:#181820;--surface2:#1f1f2a;--surface3:#26263a;
  --rim:#2e2e42;--rim2:#3a3a52;
  --cream:#e8e2d4;--gold:#b89a5a;--gold2:#d4b87a;--glow:rgba(184,154,90,0.15);
  --text:#e8e4dc;--muted:#6b6878;--dim:#38364a;
}
body{
  background:var(--surface);color:var(--text);
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}
.wrap{width:520px;max-width:100%;position:relative;z-index:1;}

.studio-label{text-align:center;margin-bottom:28px;position:relative;}
.studio-label::before,.studio-label::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:linear-gradient(to var(--d,right),#3a3a52,transparent);}
.studio-label::before{left:0;--d:right;}
.studio-label::after{right:0;--d:left;}
.studio-label span{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--gold);padding:0 16px;}

.card{background:var(--surface2);border:1px solid var(--rim);position:relative;overflow:hidden;}
.color-strip{position:absolute;top:0;left:0;bottom:0;width:4px;transition:background 0.3s;z-index:2;}

/* ORB */
.orb-section{padding:36px 36px 28px 44px;display:flex;align-items:center;gap:28px;border-bottom:1px solid var(--rim);}
.orb-wrap{position:relative;flex-shrink:0;width:110px;height:110px;}
.orb{
  width:110px;height:110px;border-radius:50%;
  transition:background 0.25s,box-shadow 0.25s;
  position:relative;cursor:pointer;
}
.orb::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:inset -6px -6px 18px rgba(0,0,0,0.3),inset 3px 3px 8px rgba(255,255,255,0.1);}
.orb-ring{position:absolute;inset:-7px;border-radius:50%;border:1px solid var(--rim2);}
.orb-ring2{position:absolute;inset:-15px;border-radius:50%;border:1px dashed var(--rim);animation:spin 20s linear infinite;opacity:0.4;}
@keyframes spin{to{transform:rotate(360deg)}}
input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border-radius:50%;}

.orb-meta{flex:1;}
.orb-hex{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:6px;}
.orb-hex em{color:var(--gold);font-style:normal;font-weight:600;}
.orb-sub{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.lum-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid var(--rim2);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.lum-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);transition:background 0.3s;}

/* INPUT */
.input-section{padding:20px 36px 20px 44px;border-bottom:1px solid var(--rim);display:flex;align-items:center;}
.input-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding-right:16px;border-right:1px solid var(--rim);margin-right:0;flex-shrink:0;}
.hash{font-size:18px;color:var(--gold);margin:0 6px 0 16px;font-weight:300;}
input[type=text]#hexField{background:transparent;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--text);letter-spacing:3px;text-transform:uppercase;flex:1;caret-color:var(--gold);}

/* VALUES */
.values-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--rim);}
.val-cell{padding:18px 20px;border-right:1px solid var(--rim);position:relative;cursor:pointer;transition:background 0.2s;}
.val-cell:last-child{border-right:none;}
.val-cell:hover{background:var(--surface3);}
.val-cell:hover .copy-ico{opacity:1;}
.val-type{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.val-text{font-size:11px;color:var(--cream);letter-spacing:0.5px;}
.copy-ico{position:absolute;top:10px;right:10px;color:var(--gold);opacity:0;transition:opacity 0.2s;}

/* CHANNELS */
.channels{padding:24px 36px 24px 44px;border-bottom:1px solid var(--rim);}
.ch-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:18px;}
.ch{display:flex;align-items:center;gap:14px;margin-bottom:13px;}
.ch:last-child{margin-bottom:0}
.ch-ltr{width:10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;font-weight:500;text-align:center;}
.ch-ltr.R{color:#e07070}.ch-ltr.G{color:#70c070}.ch-ltr.B{color:#70a0e0}
.ch-track{flex:1;height:2px;background:var(--rim);position:relative;overflow:visible;}
.ch-fill{height:100%;transition:width 0.25s ease;position:relative;}
.ch-fill::after{content:'';position:absolute;right:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:inherit;opacity:0.8;}
.ch-fill.R{background:#e07070}.ch-fill.G{background:#70c070}.ch-fill.B{background:#70a0e0}
.ch-num{width:24px;text-align:right;font-size:10px;color:var(--muted);flex-shrink:0;}

/* FOOTER */
.footer{padding:16px 36px 16px 44px;display:flex;align-items:center;justify-content:space-between;}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--dim);}
.footer-actions{display:flex;gap:8px;}
.action-btn{background:transparent;border:1px solid var(--rim2);color:var(--muted);padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s;}
.action-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--glow);}
.action-btn svg{width:11px;height:11px;flex-shrink:0;}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);border:1px solid var(--gold);padding:12px 22px;display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:0;transition:all 0.25s cubic-bezier(.16,1,.3,1);pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="studio-label"><span>Color Studio</span></div>
  <div class="card">
    <div class="color-strip" id="strip"></div>
    <div class="orb-section">
      <div class="orb-wrap">
        <div class="orb-ring2"></div>
        <div class="orb-ring"></div>
        <div class="orb" id="orb">
          <input type="color" id="picker" value="#3b82f6">
        </div>
      </div>
      <div class="orb-meta">
        <div class="orb-hex"><em>#</em><span id="hexDisplay">3B82F6</span></div>
        <div class="orb-sub">اضغط الدائرة لاختيار اللون</div>
        <div class="lum-pill"><div class="lum-dot" id="lumDot"></div><span id="lumLabel">Medium</span></div>
      </div>
    </div>
    <div class="input-section">
      <div class="input-label">Hex</div>
      <span class="hash">#</span>
      <input type="text" id="hexField" maxlength="6" value="3B82F6" spellcheck="false" autocomplete="off">
    </div>
    <div class="values-row">
      <div class="val-cell" onclick="copyVal('hex')">
        <div class="val-type">HEX</div>
        <div class="val-text" id="vHex">#3B82F6</div>
        <div class="copy-ico"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>
      <div class="val-cell" onclick="copyVal('rgb')">
        <div class="val-type">RGB</div>
        <div class="val-text" id="vRgb">rgb(59, 130, 246)</div>
        <div class="copy-ico"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>
      <div class="val-cell" onclick="copyVal('hsl')">
        <div class="val-type">HSL</div>
        <div class="val-text" id="vHsl">hsl(217, 91%, 60%)</div>
        <div class="copy-ico"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>
    </div>
    <div class="channels">
      <div class="ch-title">— RGB Channels</div>
      <div class="ch"><span class="ch-ltr R">R</span><div class="ch-track"><div class="ch-fill R" id="fR" style="width:23%"></div></div><span class="ch-num" id="nR">59</span></div>
      <div class="ch"><span class="ch-ltr G">G</span><div class="ch-track"><div class="ch-fill G" id="fG" style="width:51%"></div></div><span class="ch-num" id="nG">130</span></div>
      <div class="ch"><span class="ch-ltr B">B</span><div class="ch-track"><div class="ch-fill B" id="fB" style="width:96%"></div></div><span class="ch-num" id="nB">246</span></div>
    </div>
    <div class="footer">
      <div class="footer-brand">Color Studio</div>
      <div class="footer-actions">
        <button class="action-btn" onclick="copyVal('hex')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy HEX
        </button>
        <button class="action-btn" onclick="copyVal('all')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Copy All
        </button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastTxt">تم النسخ</span>
</div>
