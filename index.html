<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJL sys</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #141418;
    --surface-2: #1c1c22;
    --border: #2a2a34;
    --border-light: #363644;
    --gold: #c9a84c;
    --gold-light: #e2c16f;
    --gold-dim: rgba(201,168,76,0.12);
    --text: #e8e4da;
    --text-muted: #7a7870;
    --text-dim: #4a4840;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }

  .card {
    width: 560px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  /* Corner decorations */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
    z-index: 10;
  }
  .card::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .card-inner::before, .card-inner::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
    z-index: 10;
  }
  .card-inner::before { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
  .card-inner::after  { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
  .card-inner { position: relative; }

  /* Header */
  .header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .header-text p {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Preview section */
  .preview-section {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
  }
  .preview-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .preview-wrap {
    position: relative;
  }
  #preview {
    width: 100%;
    height: 160px;
    border: 1px solid var(--border-light);
    display: block;
    transition: background 0.2s ease;
    position: relative;
  }
  .preview-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  .preview-hex-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    letter-spacing: 1px;
  }
  .preview-lum {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Picker section */
  .picker-section {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  .picker-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .color-input-wrap {
    position: relative;
    flex-shrink: 0;
  }
  input[type="color"] {
    width: 64px;
    height: 64px;
    border: 1px solid var(--border-light);
    background: none;
    cursor: pointer;
    padding: 4px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    display: block;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; }
  input[type="color"]:focus { border-color: var(--gold); }

  .hex-input-wrap {
    flex: 1;
  }
  .hex-input-wrap label {
    display: block;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .hex-input-inner {
    display: flex;
    align-items: center;
    background: var(--surface-2);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .hex-input-inner:focus-within { border-color: var(--gold); }
  .hex-prefix {
    padding: 0 12px;
    color: var(--gold);
    font-size: 15px;
    font-weight: 500;
    border-right: 1px solid var(--border);
    line-height: 44px;
    user-select: none;
  }
  input[type="text"]#hexInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 0 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    line-height: 44px;
    height: 44px;
    text-transform: uppercase;
  }

  /* Values section */
  .values-section {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .value-block {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .value-block:hover { border-color: var(--border-light); }
  .value-block-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .value-block-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .value-block-text {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .copy-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 3px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .copy-btn:hover { color: var(--gold); }
  .copy-btn.copied { color: #4ade80; }

  /* Channels section */
  .channels-section {
    padding: 24px 32px;
  }
  .channels-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .channel-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .channel-row:last-child { margin-bottom: 0; }
  .channel-name {
    width: 14px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
    text-align: center;
  }
  .channel-name.r { color: #f87171; }
  .channel-name.g { color: #4ade80; }
  .channel-name.b { color: #60a5fa; }
  .channel-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .channel-bar-fill {
    height: 100%;
    transition: width 0.2s ease;
  }
  .channel-bar-fill.r { background: #f87171; }
  .channel-bar-fill.g { background: #4ade80; }
  .channel-bar-fill.b { background: #60a5fa; }
  .channel-value {
    width: 28px;
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Divider line */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 32px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-diamond {
    width: 6px; height: 6px;
    border: 1px solid var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-inner">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/>
          <circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/>
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Color Picker</h1>
        <p>Color Analysis Tool</p>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-section">
      <div class="preview-label">— Preview</div>
      <div class="preview-wrap">
        <div id="preview"></div>
        <div class="preview-overlay">
          <span class="preview-hex-badge" id="previewHex">#3B82F6</span>
          <span class="preview-lum" id="previewLum">—</span>
        </div>
      </div>
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <!-- Picker -->
    <div class="picker-section">
      <div class="picker-row">
        <div class="color-input-wrap">
          <input type="color" id="picker" value="#3b82f6">
        </div>
        <div class="hex-input-wrap">
          <label for="hexInput">Hex Value</label>
          <div class="hex-input-inner">
            <span class="hex-prefix">#</span>
            <input type="text" id="hexInput" maxlength="6" value="3B82F6" spellcheck="false">
          </div>
        </div>
      </div>
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <!-- Values -->
    <div class="values-section">
      <div class="value-block">
        <div class="value-block-label">HEX</div>
        <div class="value-block-row">
          <span class="value-block-text" id="valHex">#3B82F6</span>
          <button class="copy-btn" onclick="copyValue('hex')" title="Copy HEX">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="value-block">
        <div class="value-block-label">RGB</div>
        <div class="value-block-row">
          <span class="value-block-text" id="valRgb">59, 130, 246</span>
          <button class="copy-btn" onclick="copyValue('rgb')" title="Copy RGB">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="value-block">
        <div class="value-block-label">HSL</div>
        <div class="value-block-row">
          <span class="value-block-text" id="valHsl">217°, 91%, 60%</span>
          <button class="copy-btn" onclick="copyValue('hsl')" title="Copy HSL">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <!-- RGB Channels -->
    <div class="channels-section">
      <div class="channels-label">— RGB Channels</div>
      <div class="channel-row">
        <span class="channel-name r">R</span>
        <div class="channel-bar-wrap"><div class="channel-bar-fill r" id="barR" style="width:0%"></div></div>
        <span class="channel-value" id="chR">0</span>
      </div>
      <div class="channel-row">
        <span class="channel-name g">G</span>
        <div class="channel-bar-wrap"><div class="channel-bar-fill g" id="barG" style="width:0%"></div></div>
        <span class="channel-value" id="chG">0</span>
      </div>
      <div class="channel-row">
        <span class="channel-name b">B</span>
        <div class="channel-bar-wrap"><div class="channel-bar-fill b" id="barB" style="width:0%"></div></div>
        <span class="channel-value" id="chB">0</span>
      </div>
    </div>

  </div><!-- card-inner -->
</div><!-- card -->

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toastMsg">تم النسخ</span>
</div>

<script>
  const picker   = document.getElementById('picker');
  const hexInput = document.getElementById('hexInput');
  const preview  = document.getElementById('preview');
  const toast    = document.getElementById('toast');

  let currentColor = localStorage.getItem('color') || '#3b82f6';
  applyColor(currentColor);
  picker.value = currentColor;

  // Picker → update all
  picker.addEventListener('input', () => {
    currentColor = picker.value;
    hexInput.value = currentColor.slice(1).toUpperCase();
    applyColor(currentColor);
    localStorage.setItem('color', currentColor);
  });

  // Hex text input → update all
  hexInput.addEventListener('input', () => {
    const val = hexInput.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 6);
    hexInput.value = val;
    if (val.length === 6) {
      currentColor = '#' + val;
      picker.value = currentColor;
      applyColor(currentColor);
      localStorage.setItem('color', currentColor);
    }
  });

  function applyColor(hex) {
    const { r, g, b } = hexToRgb(hex);
    const { h, s, l } = rgbToHsl(r, g, b);
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;

    preview.style.background = hex;
    document.getElementById('previewHex').textContent = hex.toUpperCase();
    document.getElementById('previewLum').textContent = lum > 0.5 ? 'Light' : 'Dark';

    document.getElementById('valHex').textContent = hex.toUpperCase();
    document.getElementById('valRgb').textContent = `${r}, ${g}, ${b}`;
    document.getElementById('valHsl').textContent = `${h}°, ${s}%, ${l}%`;

    document.getElementById('barR').style.width = (r/255*100) + '%';
    document.getElementById('barG').style.width = (g/255*100) + '%';
    document.getElementById('barB').style.width = (b/255*100) + '%';
    document.getElementById('chR').textContent = r;
    document.getElementById('chG').textContent = g;
    document.getElementById('chB').textContent = b;
  }

  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    return {
      r: parseInt(hex.substr(0,2),16),
      g: parseInt(hex.substr(2,2),16),
      b: parseInt(hex.substr(4,2),16)
    };
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: h = ((g-b)/d + (g<b?6:0))/6; break;
        case g: h = ((b-r)/d + 2)/6; break;
        case b: h = ((r-g)/d + 4)/6; break;
      }
    }
    return {
      h: Math.round(h*360),
      s: Math.round(s*100),
      l: Math.round(l*100)
    };
  }

  const copyValues = {
    hex: () => document.getElementById('valHex').textContent,
    rgb: () => { const t = document.getElementById('valRgb').textContent; return `rgb(${t})`; },
    hsl: () => { const t = document.getElementById('valHsl').textContent; return `hsl(${t})`; }
  };

  function copyValue(type) {
    const text = copyValues[type]();
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById('toastMsg').textContent = `تم نسخ ${type.toUpperCase()}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    });
  }
</script>
</body>
</html>
